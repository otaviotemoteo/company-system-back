version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: company-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-company_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - company-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: company-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - company-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend app
  app:
    build: .
    container_name: company-app
    environment:
      # Inside Docker, containers talk to each other via service name, not localhost
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-company_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      PORT: 3333
      NODE_ENV: development
    ports:
      - "3333:3333"
    volumes:
      # Mount source code for hot reload — changes on your machine reflect instantly
      - ./src:/app/src
      - ./prisma:/app/prisma
      # node_modules stays inside the container (avoids cross-platform binary issues)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - company-network

volumes:
  postgres_data:
  redis_data:

networks:
  company-network:
    driver: bridge
